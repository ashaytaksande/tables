<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Table Master - Ultimate Edition</title>
<style>
  /* --- THEME VARIABLES --- */
  :root {
    --bg-color1: #e0c3fc; --bg-color2: #8ec5fc;
    --card-bg: rgba(255, 255, 255, 0.95);
    --text-main: #1e293b; --text-muted: #64748b;
    --primary: #3b82f6; --primary-hover: #2563eb;
    --success: #10b981; --error: #ef4444; --streak: #f59e0b;
    --btn-bg: #e2e8f0; --btn-border: #94a3b8; --btn-hover: #cbd5e1;
    --input-bg: #ffffff;
    --border-radius: 20px;
  }

  body.theme-sunset {
    --bg-color1: #ff7e5f; --bg-color2: #feb47b;
    --card-bg: rgba(255, 240, 230, 0.95);
    --text-main: #4a1c00; --primary: #ff5722;
  }

  body.theme-neon {
    --bg-color1: #000000; --bg-color2: #1a0033;
    --card-bg: rgba(20, 20, 20, 0.95);
    --text-main: #00ffcc; --text-muted: #ff00ff;
    --primary: #ff00ff; --primary-hover: #cc00cc;
    --btn-bg: #222; --btn-border: #00ffcc; --btn-hover: #333;
    --input-bg: #111;
  }

  @keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  body { 
    font-family: system-ui, -apple-system, sans-serif; 
    background: linear-gradient(135deg, var(--bg-color1) 0%, var(--bg-color2) 100%);
    background-size: 200% 200%;
    display: flex; justify-content: center; align-items: center; 
    min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box;
    transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); 
  }

  body.streak-active { animation: gradientShift 3s ease infinite; }

  .container { 
    background: var(--card-bg); padding: 2rem; border-radius: var(--border-radius); 
    box-shadow: 0 25px 50px -12px rgba(0,0,0,0.3); text-align: center; 
    max-width: 500px; width: 100%; backdrop-filter: blur(10px);
    transition: all 0.4s ease; position: relative;
  }

  .top-bar { display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; font-weight: bold; color: var(--text-muted); margin-bottom: 15px; }
  .xp-badge { background: var(--streak); color: white; padding: 5px 10px; border-radius: 10px; transition: transform 0.2s; }
  .xp-badge.bump { transform: scale(1.2); } 
  
  h1 { color: var(--text-main); margin: 0 0 1rem 0; font-size: 2.2rem; font-weight: 800; }

  .controls { display: grid; gap: 10px; margin-bottom: 20px; }
  select, button.game-mode-btn { 
    padding: 12px; border-radius: 12px; border: 2px solid var(--btn-border); 
    font-size: 1rem; font-weight: bold; color: var(--text-main); 
    background-color: var(--input-bg); cursor: pointer; transition: all 0.2s ease;
  }
  select:focus { border-color: var(--primary); outline: none; }
  .game-mode-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
  
  #bossBattleBtn { background: #8b5cf6; color: white; display: none; }
  #bossBattleBtn:hover { background: #7c3aed; }

  .timer-container { width: 100%; height: 10px; background: #e2e8f0; border-radius: 5px; margin-bottom: 15px; display: none; overflow: hidden; }
  .timer-bar { height: 100%; background: var(--error); width: 100%; transition: width 0.1s linear; }

  #question { font-size: 3.5rem; font-weight: 800; margin: 1rem 0; color: var(--text-main); }
  
  #arrayVisual { display: flex; flex-direction: column; align-items: center; gap: 4px; margin-bottom: 15px; min-height: 50px;}
  .array-row { display: flex; gap: 4px; }
  .array-dot { width: 12px; height: 12px; border-radius: 50%; background: var(--primary); opacity: 0; animation: fadeIn 0.3s forwards; }
  @keyframes fadeIn { to { opacity: 1; } }

  .input-wrapper { display: flex; justify-content: center; gap: 10px; align-items: center; }
  #answerArea { display: none; width: 100%; flex-direction: column; align-items: center;}
  
  .input-controls { display: flex; justify-content: center; gap: 10px; align-items: center; }
  #answer { 
    width: 140px; text-align: center; font-size: 2rem; font-weight: bold; padding: 15px;
    border-radius: 12px; border: 3px solid var(--btn-border); background-color: var(--input-bg); color: var(--text-main);
  }
  #answer:focus { outline: none; border-color: var(--primary); }
  
  .mic-btn { background: var(--btn-bg); color: var(--text-main); border: 2px solid var(--btn-border); border-radius: 50%; width: 55px; height: 55px; font-size: 1.5rem; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
  .mic-btn.listening { animation: pulse 1s infinite; background: var(--error); color: white; border-color: var(--error); }
  @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

  .voice-transcript { font-size: 1.1rem; color: var(--primary); font-weight: bold; margin-top: 10px; min-height: 24px; font-style: italic; display: none; }

  #mcqArea { display: none; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px; }
  .mcq-btn { padding: 15px; font-size: 1.4rem; font-weight: bold; background-color: var(--btn-bg); color: var(--text-main); border: 3px solid var(--btn-border); border-radius: 12px; cursor: pointer; transition: all 0.15s; }
  .mcq-btn:hover:not(:disabled) { background-color: var(--btn-hover); transform: translateY(-2px); }
  .mcq-btn.hint-highlight { background-color: var(--success) !important; color: white !important; border-color: var(--success) !important; transform: scale(1.05); }

  .feedback { min-height: 28px; font-weight: 800; margin-top: 15px; font-size: 1.3rem; }
  .correct { color: var(--success); } .incorrect { color: var(--error); }
  
  .stats { display: flex; justify-content: space-around; margin-top: 1.5rem; padding-top: 1.5rem; border-top: 2px solid var(--btn-border); font-weight: 700; color: var(--text-muted); }
  #score { color: var(--primary); font-size: 1.3rem; }
  #streak { color: var(--streak); font-size: 1.3rem; }
  .high-score-badge { font-size: 0.85rem; color: var(--text-muted); margin-top: 10px; font-weight: bold;}

  @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-10px);} 75% {transform: translateX(10px);} }
  .shake { animation: shake 0.3s ease-in-out; }

  #confetti-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; z-index: 10; display: none; }
  .confetti-piece { position: absolute; width: 10px; height: 10px; background: red; animation: fall 2s linear forwards; }
  @keyframes fall { to { transform: translateY(500px) rotate(720deg); opacity: 0; } }

  /* --- TUTORIAL OVERLAY --- */
  #tutorialOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 100; display: none; justify-content: center; align-items: center; backdrop-filter: blur(3px); }
  .tutorial-card { background: white; padding: 25px; border-radius: 15px; max-width: 350px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: absolute; z-index: 102; }
  .tutorial-card h3 { margin-top: 0; color: #1e293b; }
  .tutorial-card p { color: #64748b; margin-bottom: 20px; line-height: 1.5; }
  .tutorial-controls { display: flex; justify-content: space-between; gap: 10px; }
  .tut-btn { padding: 10px 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
  .tut-skip { background: #e2e8f0; color: #64748b; }
  .tut-next { background: #3b82f6; color: white; flex: 1; }
  .highlight-element { position: relative; z-index: 101 !important; box-shadow: 0 0 0 4px #3b82f6, 0 0 20px rgba(59,130,246,0.5) !important; background: white !important; border-radius: 12px; transition: all 0.3s;}
</style>
</head>
<body>

<div id="tutorialOverlay">
  <div class="tutorial-card" id="tutorialCard">
    <h3 id="tutTitle">Welcome!</h3>
    <p id="tutText">Let's take a quick tour of Table Master.</p>
    <div class="tutorial-controls">
      <button class="tut-btn tut-skip" onclick="endTutorial()">Skip</button>
      <button class="tut-btn tut-next" onclick="nextTutorialStep()">Next</button>
    </div>
  </div>
</div>

<div class="container" id="appContainer">
  <div id="confetti-container"></div>
  
  <div class="top-bar">
    <div class="xp-badge" id="xpElement">XP: <span id="xpDisplay">0</span></div>
    <div>
      <select id="themeSelect" style="padding: 5px; font-size: 0.8rem;">
        <option value="default">Default Theme</option>
        <option value="sunset" id="optSunset" disabled>Sunset (100 XP)</option>
        <option value="neon" id="optNeon" disabled>Neon (300 XP)</option>
      </select>
      <button class="help-btn" onclick="startTutorial()" title="How to play" style="background: var(--btn-bg); border: 2px solid var(--btn-border); color: var(--text-main); border-radius: 50%; width: 30px; height: 30px; cursor: pointer; font-weight: bold; margin-left: 5px;">?</button>
    </div>
  </div>

  <h1>Table Master 🚀</h1>
  
  <div class="controls">
    <select id="tableSelect">
      <option value="" disabled selected>1. Choose a Table...</option>
      <option value="random">🌟 Mixed Practice (1-20)</option>
    </select>
    
    <select id="levelSelect">
      <option value="learning" selected>🟢 Learning (Visual Array & Hint)</option>
      <option value="practice">🟡 Practice (Multiple Choice)</option>
      <option value="advanced">🟠 Advanced (Type & Auto-Submit)</option>
      <option value="master">🔴 Master (Voice or Type)</option>
    </select>
    
    <div style="display: flex; gap: 5px;" id="modeButtons">
      <button class="game-mode-btn active" id="modeCasual" style="flex:1;">Casual</button>
      <button class="game-mode-btn" id="modeTime" style="flex:1;">Time Attack</button>
    </div>
    <button id="bossBattleBtn" class="game-mode-btn">👹 Boss Battle (Nemesis Numbers)</button>
  </div>
  
  <div class="timer-container" id="timerContainer"><div class="timer-bar" id="timerBar"></div></div>

  <div id="gameArea" style="display:none;">
    <div id="question"></div>
    <div id="arrayVisual"></div>
    <div id="mcqArea"></div>

    <div id="answerArea">
      <div class="input-controls">
        <input type="number" id="answer" placeholder="?" autocomplete="off">
        <button id="micBtn" class="mic-btn" title="Tap once to speak">🎤</button>
      </div>
      <div id="voiceTranscript" class="voice-transcript"></div>
    </div>
    
    <div id="feedback" class="feedback"></div>
    
    <div class="stats">
      <div>Score: <span id="score">0</span></div>
      <div>Streak: <span id="streak">0</span> <span id="streakEmoji">🔥</span></div>
    </div>
    <div class="high-score-badge">🏆 High Score: <span id="highScoreDisplay">0</span></div>
  </div>
</div>

<script>
  // --- STATE ---
  let currentTable = 1, currentMultiplier = 1, correctAnswer = 1;
  let gameMode = 'casual'; 
  let timeLeft = 60, timerInterval, flashTimeout;
  
  // Storage Helper for Incognito compatibility
  function getSafeStore(key, def) {
    try { return localStorage.getItem(key) || def; } catch(e) { return def; }
  }

  let score = parseInt(getSafeStore('tm_score', 0));
  let streak = parseInt(getSafeStore('tm_streak', 0));
  let highScore = parseInt(getSafeStore('tm_highScore', 0));
  let totalXP = parseInt(getSafeStore('tm_xp', 0));
  let currentTheme = getSafeStore('tm_theme', 'default');
  let nemesisNumbers = JSON.parse(getSafeStore('tm_nemesis', '{}'));

  // --- AUDIO SYNTH ---
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  function playTone(freq, type, duration, vol=0.1) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    osc.type = type; osc.frequency.value = freq;
    osc.connect(gainNode); gainNode.connect(audioCtx.destination);
    gainNode.gain.setValueAtTime(vol, audioCtx.currentTime);
    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
    osc.start(); osc.stop(audioCtx.currentTime + duration);
  }
  function playSuccess() { playTone(523.25, 'sine', 0.1); setTimeout(() => playTone(659.25, 'sine', 0.2), 100); }
  function playError() { playTone(150, 'sawtooth', 0.3, 0.2); }
  function playLevelUp() { [440, 554.37, 659.25, 880].forEach((f, i) => setTimeout(() => playTone(f, 'square', 0.3), i*100)); }

  // --- DOM ELEMENTS ---
  const UI = {
    app: document.getElementById('appContainer'), xpElement: document.getElementById('xpElement'),
    tableSel: document.getElementById('tableSelect'), levelSel: document.getElementById('levelSelect'),
    themeSel: document.getElementById('themeSelect'), xpDisp: document.getElementById('xpDisplay'),
    casualBtn: document.getElementById('modeCasual'), timeBtn: document.getElementById('modeTime'), bossBtn: document.getElementById('bossBattleBtn'),
    gameArea: document.getElementById('gameArea'), question: document.getElementById('question'),
    arrayVis: document.getElementById('arrayVisual'), mcqArea: document.getElementById('mcqArea'),
    ansArea: document.getElementById('answerArea'), answer: document.getElementById('answer'),
    micBtn: document.getElementById('micBtn'), voiceTranscript: document.getElementById('voiceTranscript'),
    feedback: document.getElementById('feedback'), score: document.getElementById('score'),
    streak: document.getElementById('streak'), streakEmoji: document.getElementById('streakEmoji'),
    timerCont: document.getElementById('timerContainer'), timerBar: document.getElementById('timerBar'),
    confetti: document.getElementById('confetti-container'), highScore: document.getElementById('highScoreDisplay')
  };

  for(let i=1; i<=20; i++) UI.tableSel.innerHTML += `<option value="${i}">Table of ${i}</option>`;
  
  // Initialize UI
  setTheme(currentTheme, false);
  updateMetagameUI(); updateStats(); 
  if(score > 0 || streak > 0) { UI.gameArea.style.display = 'block'; generateQuestion(); }

  // --- THEME MANAGEMENT ---
  function setTheme(themeName, save = true) {
    document.body.className = '';
    if(themeName !== 'default') { document.body.classList.add(`theme-${themeName}`); }
    UI.themeSel.value = themeName;
    if(save) {
      currentTheme = themeName;
      try { localStorage.setItem('tm_theme', themeName); } catch(e) {}
    }
  }

  UI.themeSel.addEventListener('change', (e) => setTheme(e.target.value));

  function updateMetagameUI() {
    UI.xpDisp.textContent = totalXP; UI.highScore.textContent = highScore;
    if (totalXP >= 100) { UI.themeSel.options[1].disabled = false; UI.themeSel.options[1].text = "Sunset Theme"; }
    if (totalXP >= 300) { UI.themeSel.options[2].disabled = false; UI.themeSel.options[2].text = "Neon Cyberpunk"; }
    UI.bossBtn.style.display = Object.keys(nemesisNumbers).length > 0 ? 'block' : 'none';
  }

  // --- TUTORIAL ---
  const tutorialSteps = [
    { el: '#tableSelect', title: 'Choose Your Target', text: 'Select a table to practice, or choose "Mixed Practice" to test all tables.' },
    { el: '#levelSelect', title: 'Difficulty', text: 'Learning mode draws visual dots. Master mode uses voice or typing.' },
    { el: '#modeButtons', title: 'Pick a Mode', text: 'Casual for building streaks, or Time Attack for speed!' },
    { el: '#xpElement', title: 'Level Up', text: 'Earn XP for correct answers to unlock new color themes!' }
  ];
  let currentStep = 0;
  function startTutorial() {
    currentStep = 0; document.getElementById('tutorialOverlay').style.display = 'flex';
    renderTutorialStep();
  }
  function renderTutorialStep() {
    document.querySelectorAll('.highlight-element').forEach(el => el.classList.remove('highlight-element'));
    if(currentStep >= tutorialSteps.length) { endTutorial(); return; }
    const step = tutorialSteps[currentStep];
    const targetEl = document.querySelector(step.el);
    if(targetEl) targetEl.classList.add('highlight-element');
    document.getElementById('tutTitle').textContent = step.title;
    document.getElementById('tutText').textContent = step.text;
  }
  function nextTutorialStep() { currentStep++; renderTutorialStep(); }
  function endTutorial() {
    document.getElementById('tutorialOverlay').style.display = 'none';
    document.querySelectorAll('.highlight-element').forEach(el => el.classList.remove('highlight-element'));
    try { localStorage.setItem('tm_seenTutorial_v2', 'true'); } catch(e) {}
  }

  // --- GAME LOGIC ---
  UI.casualBtn.onclick = () => setMode('casual'); UI.timeBtn.onclick = () => setMode('time'); UI.bossBtn.onclick = () => setMode('boss');
  function setMode(mode) {
    gameMode = mode;
    UI.casualBtn.classList.toggle('active', mode === 'casual'); UI.timeBtn.classList.toggle('active', mode === 'time'); UI.bossBtn.classList.toggle('active', mode === 'boss');
    UI.timerCont.style.display = mode === 'time' ? 'block' : 'none';
    score = 0; streak = 0; updateStats();
    if(UI.tableSel.value) startGame();
  }
  function startGame() {
    clearInterval(timerInterval); document.body.classList.remove('streak-active'); UI.gameArea.style.display = 'block';
    if (gameMode === 'time') {
      timeLeft = 60;
      timerInterval = setInterval(() => {
        timeLeft -= 0.1; UI.timerBar.style.width = `${(timeLeft/60)*100}%`;
        if(timeLeft <= 0) {
          clearInterval(timerInterval); UI.feedback.textContent = `Time's Up!`; 
          setTimeout(startGame, 3000);
        }
      }, 100);
    }
    generateQuestion();
  }

  UI.tableSel.onchange = () => { score=0; streak=0; startGame(); };
  UI.levelSel.onchange = startGame;

  function generateQuestion() {
    clearTimeout(flashTimeout); UI.feedback.textContent = ''; 
    UI.mcqArea.style.pointerEvents = 'auto'; UI.voiceTranscript.style.display = 'none';
    
    if (gameMode === 'boss' && Object.keys(nemesisNumbers).length > 0) {
      const keys = Object.keys(nemesisNumbers);
      const chosen = keys[Math.floor(Math.random() * keys.length)].split('x');
      currentTable = parseInt(chosen[0]); currentMultiplier = parseInt(chosen[1]);
    } else {
      const val = UI.tableSel.value || 1; 
      currentTable = val === 'random' ? Math.floor(Math.random() * 20) + 1 : parseInt(val);
      currentMultiplier = Math.floor(Math.random() * 10) + 1;
    }
    correctAnswer = currentTable * currentMultiplier;
    UI.question.textContent = `${currentTable} × ${currentMultiplier}`;
    
    const lvl = UI.levelSel.value;
    drawArray(currentTable, currentMultiplier);
    if (lvl === 'advanced' || lvl === 'master') {
      UI.mcqArea.style.display = 'none'; UI.ansArea.style.display = 'flex'; UI.answer.value = ''; UI.answer.focus();
      UI.micBtn.style.display = (lvl === 'master') ? 'block' : 'none';
    } else {
      UI.ansArea.style.display = 'none'; UI.mcqArea.style.display = 'grid'; renderMCQ(lvl);
    }
  }

  function drawArray(r, c) {
    UI.arrayVis.innerHTML = '';
    if (UI.levelSel.value !== 'learning') return;
    if (r*c > 100) { UI.arrayVis.innerHTML = '<span style="color:#888;">(Array too large)</span>'; return; }
    for(let i=0; i<r; i++) {
      let row = document.createElement('div'); row.className = 'array-row';
      for(let j=0; j<c; j++) {
        let d = document.createElement('div'); d.className = 'array-dot';
        d.style.animationDelay = `${(i*c+j)*0.02}s`; row.appendChild(d);
      }
      UI.arrayVis.appendChild(row);
    }
  }

  function renderMCQ(lvl) {
    let opts = new Set([correctAnswer]);
    while(opts.size < 4) {
      let f = correctAnswer + ((Math.floor(Math.random()*4)+1)*currentTable*(Math.random()>0.5?1:-1));
      if(f>0) opts.add(f);
    }
    UI.mcqArea.innerHTML = '';
    Array.from(opts).sort(()=>Math.random()-0.5).forEach(o => {
      let b = document.createElement('button'); b.className = 'mcq-btn'; b.textContent = o;
      if(lvl === 'learning' && o === correctAnswer) b.classList.add('hint-highlight');
      b.onclick = () => processAnswer(o);
      UI.mcqArea.appendChild(b);
    });
  }

  function processAnswer(userVal) {
    if (userVal === correctAnswer) {
      playSuccess(); score += (UI.levelSel.value === 'learning' ? 5 : 10);
      totalXP += (UI.levelSel.value === 'learning' ? 5 : 10); streak++;
      if (gameMode === 'time') timeLeft = Math.min(60, timeLeft + 2);
      UI.feedback.textContent = 'Correct! 🎉'; UI.feedback.className = 'feedback correct';
      
      checkThemeUnlocks(); // Updated logic inside
      updateStats(); updateMetagameUI();
      setTimeout(generateQuestion, 600);
    } else {
      playError(); UI.app.classList.add('shake'); setTimeout(() => UI.app.classList.remove('shake'), 300);
      UI.feedback.textContent = `Oops! It was ${correctAnswer}`; UI.feedback.className = 'feedback incorrect';
      streak = 0; updateStats();
      let k = `${currentTable}x${currentMultiplier}`; nemesisNumbers[k] = (nemesisNumbers[k]||0)+1;
      setTimeout(generateQuestion, 2000);
    }
  }

  // --- FIXED THEME UNLOCK LOGIC ---
  function checkThemeUnlocks() {
    let unlocked = false;
    // Milestone 1: Sunset
    if (totalXP >= 100 && currentTheme === 'default') {
      setTheme('sunset');
      UI.feedback.textContent = 'Sunset Theme Unlocked! 🌅';
      playLevelUp(); triggerConfetti();
      unlocked = true;
    } 
    // Milestone 2: Neon
    if (totalXP >= 300 && currentTheme !== 'neon') {
      setTheme('neon');
      UI.feedback.textContent = 'Neon Theme Unlocked! 🌃';
      playLevelUp(); triggerConfetti();
      unlocked = true;
    }
    return unlocked;
  }

  function updateStats() {
    UI.score.textContent = score; UI.streak.textContent = streak; UI.highScore.textContent = highScore;
    document.body.classList.toggle('streak-active', streak >= 5);
    try {
      localStorage.setItem('tm_score', score); localStorage.setItem('tm_streak', streak); 
      localStorage.setItem('tm_xp', totalXP);
      if(score > highScore) { highScore = score; localStorage.setItem('tm_highScore', highScore); }
      localStorage.setItem('tm_nemesis', JSON.stringify(nemesisNumbers));
    } catch(e) {}
  }

  function triggerConfetti() {
    UI.confetti.style.display = 'block'; UI.confetti.innerHTML = '';
    for(let i=0; i<30; i++) {
      let c = document.createElement('div'); c.className = 'confetti-piece';
      c.style.left = Math.random()*100+'%'; c.style.backgroundColor = '#f0f';
      UI.confetti.appendChild(c);
    }
    setTimeout(() => UI.confetti.style.display = 'none', 2000);
  }

  UI.answer.oninput = () => { if(parseInt(UI.answer.value) === correctAnswer) processAnswer(correctAnswer); };

  // --- FIXED VOICE RECOGNITION ---
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (SpeechRecognition) {
    const rec = new SpeechRecognition();
    rec.continuous = false; rec.interimResults = true; rec.lang = 'en-IN';
    
UI.micBtn.onclick = () => {
  try {
    rec.start(); 
    UI.micBtn.classList.add('listening');
    UI.voiceTranscript.style.display = 'block';
    // 1. Alert the user to wait for the hardware to initialize
    UI.voiceTranscript.textContent = 'Wait...'; 
  } catch(e) {
    console.log("Recognition already started");
  }
};

// 2. NEW: Trigger this when the mic is actually receiving audio
rec.onaudiostart = () => {
  UI.voiceTranscript.textContent = 'Speak Now! 🎙️';
};

rec.onresult = (e) => {
  // 3. Capture the transcript from the most recent result
  let t = e.results[0][0].transcript.toLowerCase().trim();
  UI.voiceTranscript.textContent = `🗣️ "${t}"`;
  
  let guess = extractAnswer(t, correctAnswer);
  
  if (guess !== null) {
    UI.answer.value = guess;
    // 4. If correct, stop and process
    if (guess === correctAnswer) {
      rec.stop(); 
      processAnswer(guess);
    } 
    // If wrong, let the onend handler reset the mic so they can try again
  }
};

rec.onerror = (event) => {
  console.error("Speech Error:", event.error);
  UI.voiceTranscript.textContent = "Try again...";
};

rec.onend = () => {
  UI.micBtn.classList.remove('listening');
  // Hide transcript after 2 seconds if no answer was processed
  setTimeout(() => {
    if (!UI.micBtn.classList.contains('listening')) {
      UI.voiceTranscript.style.display = 'none';
    }
  }, 2000);
};

function extractAnswer(t, target) {
    // 1. Clean up: remove punctuation and extra spaces
    let cleanText = t.toLowerCase().replace(/[.,?!-]/g, ' ').trim();
    let words = cleanText.split(/\s+/);

    // 2. Direct Digit Check (Handle "5", "05", "005")
    for (let word of words) {
        if (!isNaN(parseInt(word)) && parseInt(word) === target) return target;
    }

    // 3. Expanded Phonetic Map
    const map = {
        zero: 0, one: 1, won: 1, two: 2, to: 2, too: 2, three: 3, tree: 3, free: 3,
        four: 4, for: 4, five: 5, fine: 5, fire: 5, file: 5, phi: 5, // Added common "5" mis-transcripts
        six: 6, seven: 7, eight: 8, ate: 8, nine: 9, ten: 10, then: 10, tin: 10, 
        eleven: 11, twelve: 12, thirteen: 13, fourteen: 14, fifteen: 15
    };

    // 4. Word-by-Word Map Check
    if (words.length === 1 && map[words[0]] !== undefined) {
        return map[words[0]];
    }

    // 5. Compound Number Logic (e.g., "twenty five")
    let sum = 0;
    words.forEach(w => {
        if (!isNaN(parseInt(w))) sum += parseInt(w);
        else if (map[w] !== undefined) sum += map[w];
    });

    return sum > 0 ? sum : null;
}
  }

  // --- FIXED TUTORIAL INITIALIZATION ---
  window.addEventListener('load', () => {
    let seen = false;
    try { seen = localStorage.getItem('tm_seenTutorial_v2') === 'true'; } catch(e) {}
    if (!seen) setTimeout(startTutorial, 1000);
  });
</script>
